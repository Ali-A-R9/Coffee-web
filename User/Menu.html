<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Menu Management</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body class="container">
  <div class="card">
    <h1>Menu Management</h1>

    <!-- Add Category -->
    <form id="categoryForm" class="form-inline">
      <label>New Category</label>
      <input id="categoryName" type="text" placeholder="e.g. Hot Drinks">
      <button type="submit">Add Category</button>
      <p id="categoryMsg" aria-live="polite"></p>
    </form>

    <hr style="margin:20px 0;">

    <!-- Add Item -->
    <form id="itemForm" class="form-inline">
      <label>Item Name</label>
      <input id="itemName" type="text" placeholder="e.g. Latte">

      <label>Price</label>
      <input id="itemPrice" type="number" placeholder="e.g. 18">

      <label>Select Category</label>
      <select id="itemCategory"></select>

      <button type="submit">Add Item</button>
      <p id="itemMsg" aria-live="polite"></p>
    </form>

    <hr style="margin:20px 0;">

    <div id="menuDisplay"></div>

    <button class="ghost" type="button" onclick="location.href='Dashboard.html'">
      Back to Dashboard
    </button>

    <button id="logoutBtn" class="ghost" type="button">
      Logout
    </button>
  </div>

  <script src="../script/auth.js"></script>
  <script src="../script/menu.js"></script>
</body>
</html>
